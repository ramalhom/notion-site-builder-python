{% extends "base.html" %}

{% block title %}Connexion Administration{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-12">
    <div class="max-w-md mx-auto bg-card border rounded-lg p-8 shadow-sm">
        <h1 class="text-2xl font-bold mb-6 text-center">Administration</h1>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-md mb-6 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium mb-2">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" required
                    class="w-full px-3 py-2 border rounded-md bg-background">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium mb-2">Mot de passe</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-3 py-2 border rounded-md bg-background">
            </div>

            <button type="submit"
                class="w-full bg-primary text-primary-foreground py-2 rounded-md font-medium hover:bg-primary/90 transition-colors">
                Se connecter
            </button>
        </form>
    </div>
</div>
{% endblock %}
