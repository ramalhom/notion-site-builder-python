{% extends "base.html" %}

{% block title %}Configuration Initiale{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-12">
    <div class="max-w-md mx-auto bg-card border rounded-lg p-8 shadow-sm">
        <h1 class="text-2xl font-bold mb-6 text-center">Configuration du compte</h1>
        <p class="text-sm text-muted-foreground mb-8 text-center text-balance">
            C'est la première fois que vous lancez l'application. Veuillez créer vos identifiants administrateur.
        </p>

        <form method="POST" action="/setup" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium mb-2">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" required
                    class="w-full px-3 py-2 border rounded-md bg-background" placeholder="admin">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium mb-2">Mot de passe</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-3 py-2 border rounded-md bg-background">
            </div>

            <button type="submit"
                class="w-full bg-primary text-primary-foreground py-2 rounded-md font-medium hover:bg-primary/90 transition-colors">
                Créer mon compte
            </button>
        </form>
    </div>
</div>
{% endblock %}
