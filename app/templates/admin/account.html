{% extends "base.html" %}

{% block title %}Mon Compte - Administration{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="flex items-center gap-4 mb-8">
        <a href="/admin" class="text-muted-foreground hover:text-foreground">
            ← Tableau de bord
        </a>
        <h1 class="text-2xl font-bold">Gestion du compte</h1>
    </div>

    <div class="max-w-xl bg-card border rounded-lg p-6 shadow-sm">
        <form method="POST" action="/admin/account" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium mb-2">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" value="{{ user.username }}" required
                    class="w-full px-3 py-2 border rounded-md bg-background">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium mb-2">
                    Nouveau mot de passe <span class="text-xs font-normal text-muted-foreground">(laisser vide pour ne
                        pas changer)</span>
                </label>
                <input type="password" id="password" name="password"
                    class="w-full px-3 py-2 border rounded-md bg-background">
            </div>

            <div class="flex items-center justify-end gap-3 pt-4 border-t">
                <button type="submit"
                    class="bg-primary text-primary-foreground px-6 py-2 rounded-md font-medium hover:bg-primary/90 transition-colors">
                    Enregistrer les modifications
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
