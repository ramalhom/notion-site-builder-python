{% extends "base.html" %}

{% block title %}Page non trouvée{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-24 text-center">
    <h1 class="text-6xl font-bold mb-4">404</h1>
    <h2 class="text-2xl font-semibold mb-6">Oups ! Page non trouvée</h2>
    <p class="text-muted-foreground mb-8">La page que vous recherchez n'existe pas ou a été déplacée.</p>
    <a href="/">
        <button
            class="bg-primary text-primary-foreground hover:bg-primary/90 px-8 py-3 rounded-md font-medium transition-colors">
            Retour à l'accueil
        </button>
    </a>
</div>
{% endblock %}
