services:
  app:
    container_name: notion-site-builder-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    environment:
      - DATABASE_URL=sqlite:////app/data/database.db
    volumes:
      - ./database:/app/data
    restart: unless-stopped
    networks:
      - notion-network

networks:
  notion-network:
    driver: bridge
